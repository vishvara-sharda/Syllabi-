
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <title>Tree hierarchy diagram</title>
      <meta name="description" content="Organize and visualize complex information with a user-friendly tree hierarchy diagram, perfect for educators, students, and professionals seeking clarity." />
      <meta name="robots" content="noindex, nofollow" />
      <style>
        html, body { height: 100%; margin: 0; }
        #root { height: 100%; }

        /* ── 60/30/10 palette override ─────────────────────────────── */
        :root {
          /* 60% Bright sky blue — backgrounds, borders */
          --background:        #EBF8FF;
          --input-background:  #EBF8FF;
          --muted:             #D6F1FD;
          --muted-foreground:  #1A6A8A;
          --border:            rgba(56,189,248,0.4);
          --ring:              #F5E035;
          --heading-accent:    #38BDF8;
          --heading-accent-light:  rgba(56,189,248,0.15);
          --heading-accent-border: rgba(56,189,248,0.4);
          --switch-background: #38BDF8;
          --foreground:        #0D1A22;
          /* astraui 60% surface tokens */
          --surface-bg:        #EBF8FF;
          --surface-hover:     #D6F1FD;
          --bg-subtle:         rgba(56,189,248,0.1);
          --bg-hover:          rgba(56,189,248,0.18);
          --bg-faint:          rgba(235,248,255,0.5);
          --border-primary:    rgba(56,189,248,0.4);
          --border-secondary:  rgba(56,189,248,0.2);
          --border-selected:   rgba(56,189,248,0.8);
          --input-bg:          rgba(56,189,248,0.1);
          --text-primary:      #0D1A22;
          --text-secondary:    rgba(13,26,34,0.6);
          --text-tertiary:     rgba(13,26,34,0.35);

          /* 30% Mauve pinkish-brown — cards, sidebar, panels */
          --card:              #F0DFE2;
          --card-foreground:   #3D1A21;
          --popover:           #F0DFE2;
          --popover-foreground:#3D1A21;
          --secondary:         #B5838D;
          --secondary-foreground: #ffffff;
          --sidebar:           #E8D0D5;
          --sidebar-foreground:#3D1A21;
          --sidebar-accent:    #D6B8BE;
          --sidebar-accent-foreground: #3D1A21;
          --sidebar-border:    rgba(56,189,248,0.4);
          /* astraui 30% tokens */
          --brand-secondary:   #F5D4D9;
          --brand-tertiary:    #FAF0F2;
          --brand-muted:       #B5838D;

          /* 10% Lemon yellow — buttons, accents, active states */
          --primary:           #F5E035;
          --primary-foreground:#1C0A10;
          --accent:            #F5E035;
          --accent-foreground: #1C0A10;
          --sidebar-primary:   #F5E035;
          --sidebar-primary-foreground: #1C0A10;
          --sidebar-ring:      #F5E035;
          /* astraui 10% tokens */
          --brand-primary:     #F5E035;
          --brand-hover:       #E8D22A;
          --brand-dark:        #D4BF18;
          --on-brand:          #1C0A10;

          /* charts */
          --chart-1: #F5E035;
          --chart-2: #38BDF8;
          --chart-3: #B5838D;
          --chart-4: #F5E035;
          --chart-5: #B5838D;
        }
      </style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
